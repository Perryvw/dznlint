name: Release

on:
    push:
        tags: "*"

permissions:
  id-token: write  # Required for trusted publishing
  contents: read

jobs:
    release:
        name: Release
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v4
            - name: Use Node.js 22.14.0
              uses: actions/setup-node@v1
              with:
                  node-version: 22.14.0
                  registry-url: "https://registry.npmjs.org"
            - run: npm ci
            - run: npm run build
            - run: npm publish
